
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream:   #faf8f3;
      --ink:     #1a1814;
      --ink2:    #3d3832;
      --ink3:    #7a7268;
      --accent:  #c0392b;
      --accent2: #2e7d52;
      --border:  #e4dfd6;
      --card:    #ffffff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.7}

    /* ── NAV ── */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;backdrop-filter:blur(12px);background:rgba(250,248,243,.88);border-bottom:1px solid var(--border);padding:0 5vw}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1200px;margin:0 auto}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--ink);text-decoration:none;letter-spacing:-.02em}
    .nav-logo span{color:var(--accent)}
    .nav-links{display:flex;gap:2rem;list-style:none}
    .nav-links a{color:var(--ink2);text-decoration:none;font-size:.875rem;font-weight:500;letter-spacing:.02em;text-transform:uppercase;transition:color .2s}
    .nav-links a:hover{color:var(--accent)}
    .nav-menu{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:4px}
    .nav-menu span{display:block;width:22px;height:2px;background:var(--ink);transition:.3s}

    /* ── HERO ── */
    #hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding:0 5vw}
    .hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.08;filter:grayscale(1)}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,var(--cream) 55%,transparent)}
    .hero-inner{position:relative;max-width:1200px;margin:0 auto;width:100%;padding-top:80px}
    .hero-eyebrow{display:inline-flex;align-items:center;gap:.5rem;background:var(--accent);color:#fff;font-size:.75rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:.35rem .9rem;border-radius:2px;margin-bottom:1.5rem}
    .hero-name{font-family:'Playfair Display',serif;font-size:clamp(3rem,8vw,6rem);font-weight:900;line-height:1.0;letter-spacing:-.04em;color:var(--ink);margin-bottom:1.25rem}
    .hero-name em{font-style:italic;color:var(--accent)}
    .hero-tagline{font-size:clamp(1.1rem,2.5vw,1.4rem);color:var(--ink2);font-weight:300;max-width:520px;line-height:1.6;margin-bottom:2.5rem}
    .hero-btns{display:flex;gap:1rem;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.8rem 2rem;border-radius:4px;font-size:.9rem;font-weight:600;text-decoration:none;transition:all .2s;cursor:pointer;border:none}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:#a93226;transform:translateY(-2px);box-shadow:0 8px 20px rgba(192,57,43,.3)}
    .btn-outline{background:transparent;color:var(--ink);border:2px solid var(--border)}
    .btn-outline:hover{border-color:var(--ink);transform:translateY(-2px)}
    .hero-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;color:var(--ink3);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase}
    .scroll-line{width:1px;height:50px;background:linear-gradient(to bottom,var(--ink3),transparent);animation:scrollAnim 2s ease-in-out infinite}
    @keyframes scrollAnim{0%,100%{transform:scaleY(1);opacity:.6}50%{transform:scaleY(.5);opacity:.2}}

    /* ── SECTION COMMON ── */
    section:not(#hero){padding:100px 5vw}
    .section-inner{max-width:1200px;margin:0 auto}
    .section-label{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;color:var(--accent);font-size:.78rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
    .section-label::after{content:'';flex:1;max-width:60px;height:1px;background:var(--accent);opacity:.4}
    .section-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;line-height:1.15;letter-spacing:-.03em;color:var(--ink);margin-bottom:1rem}
    .section-sub{color:var(--ink3);font-size:1.05rem;max-width:560px;line-height:1.7}

    /* ── ABOUT ── */
    #about{background:#fff;border-top:1px solid var(--border)}
    .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;margin-top:3rem}
    .about-img-wrap{position:relative}
    .about-img{width:100%;aspect-ratio:4/5;object-fit:cover;display:block;filter:grayscale(.15)}
    .about-img-frame{position:absolute;inset:-12px;border:2px solid var(--accent);opacity:.3;pointer-events:none}
    .about-text{font-size:1.05rem;color:var(--ink2);line-height:1.9;margin-bottom:2rem}
    .about-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:2rem}
    .stat{text-align:center;padding:1.25rem;background:var(--cream);border-radius:8px}
    .stat-num{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--accent)}
    .stat-label{font-size:.8rem;color:var(--ink3);font-weight:500;text-transform:uppercase;letter-spacing:.08em}

    /* ── SKILLS ── */
    #skills{background:var(--cream)}
    .skills-header{display:grid;grid-template-columns:1fr 1fr;gap:3rem;margin-bottom:3rem;align-items:end}
    .skills-cats{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:2rem}
    .cat-btn{padding:.4rem 1rem;border:1.5px solid var(--border);background:transparent;border-radius:20px;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s;color:var(--ink2)}
    .cat-btn.active,.cat-btn:hover{border-color:var(--accent);background:var(--accent);color:#fff}
    .skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
    .skill-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.5rem;transition:transform .2s,box-shadow .2s}
    .skill-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.07)}
    .skill-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem}
    .skill-name{font-weight:600;font-size:.95rem;color:var(--ink)}
    .skill-pct{font-size:.8rem;color:var(--accent);font-weight:700}
    .skill-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
    .skill-fill{height:100%;background:var(--accent);border-radius:99px;transform:scaleX(0);transform-origin:left;transition:transform .8s cubic-bezier(.4,0,.2,1)}
    .skill-cat-tag{font-size:.72rem;color:var(--ink3);font-weight:500;margin-top:.5rem}

    /* ── PROJECTS ── */
    #projects{background:#fff;border-top:1px solid var(--border)}
    .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem;margin-top:3rem}
    .project-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;transition:transform .25s,box-shadow .25s;display:flex;flex-direction:column}
    .project-card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(0,0,0,.1)}
    .project-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;filter:grayscale(.1)}
    .project-body{padding:1.5rem;flex:1;display:flex;flex-direction:column}
    .project-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:700;margin-bottom:.6rem;color:var(--ink)}
    .project-desc{color:var(--ink3);font-size:.9rem;line-height:1.7;flex:1;margin-bottom:1rem}
    .project-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.25rem}
    .tag{font-size:.72rem;background:var(--cream);color:var(--ink2);padding:.25rem .65rem;border-radius:3px;font-weight:600;letter-spacing:.02em}
    .project-link{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;font-weight:600;color:var(--accent);text-decoration:none;transition:gap .2s}
    .project-link:hover{gap:.7rem}

    /* ── EXPERIENCE / EDUCATION ── */
    #experience,#education{background:var(--cream)}
    #education{background:#fff;border-top:1px solid var(--border)}
    .timeline{margin-top:3rem;position:relative}
    .timeline::before{content:'';position:absolute;left:16px;top:0;bottom:0;width:2px;background:var(--border)}
    .tl-item{display:grid;grid-template-columns:auto 1fr;gap:1.5rem;margin-bottom:2.5rem;position:relative}
    .tl-dot{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.25rem;position:relative;z-index:1;box-shadow:0 0 0 4px var(--cream)}
    #education .tl-dot{background:var(--accent2)}
    #education .timeline::before{background:var(--border)}
    .tl-dot svg{width:16px;height:16px;fill:#fff}
    .tl-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.5rem;transition:box-shadow .2s}
    #experience .tl-card{background:var(--cream)}
    .tl-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.07)}
    .tl-meta{display:flex;flex-wrap:wrap;justify-content:space-between;gap:.5rem;margin-bottom:.5rem}
    .tl-role{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--ink)}
    .tl-period{font-size:.8rem;color:#fff;background:var(--accent);padding:.2rem .6rem;border-radius:3px;font-weight:600;height:fit-content}
    #education .tl-period{background:var(--accent2)}
    .tl-company{font-size:.9rem;color:var(--accent);font-weight:600;margin-bottom:.6rem}
    #education .tl-company{color:var(--accent2)}
    .tl-desc{color:var(--ink3);font-size:.9rem;line-height:1.7}

    /* ── CONTACT ── */
    #contact{background:var(--ink);color:#fff;border-top:none}
    #contact .section-label{color:rgba(255,255,255,.4)}
    #contact .section-label::after{background:rgba(255,255,255,.3)}
    #contact .section-title{color:#fff}
    #contact .section-sub{color:rgba(255,255,255,.6)}
    .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;margin-top:3rem;align-items:start}
    .contact-items{display:flex;flex-direction:column;gap:1.5rem;margin-top:2rem}
    .contact-item{display:flex;align-items:center;gap:1rem}
    .contact-icon{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .contact-icon svg{width:20px;height:20px;fill:rgba(255,255,255,.7)}
    .contact-val{color:rgba(255,255,255,.85);font-size:.95rem;text-decoration:none}
    .contact-val:hover{color:#fff}
    .social-links{display:flex;gap:1rem;margin-top:2.5rem}
    .social-link{width:44px;height:44px;border-radius:10px;border:1px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);text-decoration:none;transition:all .2s}
    .social-link:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:translateY(-3px)}
    .social-link svg{width:18px;height:18px;fill:currentColor}
    .contact-form-side{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:2rem}
    .contact-form-side h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:#fff;margin-bottom:1.5rem}
    .form-group{margin-bottom:1.25rem}
    .form-group label{display:block;font-size:.8rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:.5rem}
    .form-group input,.form-group textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.8rem 1rem;color:#fff;font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;transition:border .2s}
    .form-group textarea{resize:vertical;min-height:110px}
    .form-group input:focus,.form-group textarea:focus{border-color:rgba(192,57,43,.6);background:rgba(255,255,255,.07)}
    .form-note{font-size:.8rem;color:rgba(255,255,255,.4);margin-top:.5rem}

    /* ── FOOTER ── */
    footer{background:var(--ink);border-top:1px solid rgba(255,255,255,.07);padding:1.5rem 5vw;text-align:center;color:rgba(255,255,255,.3);font-size:.82rem}
    footer a{color:rgba(255,255,255,.4);text-decoration:none}
    footer a:hover{color:var(--accent)}

    /* ── LOADING STATE ── */
    .loading-screen{position:fixed;inset:0;background:var(--cream);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .5s}
    .loading-screen.hidden{opacity:0;pointer-events:none}
    .loader{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-text{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--ink3)}

    /* ── SETUP BANNER ── */
    .setup-banner{background:#fef3cd;border:1px solid #f0c040;color:#7a5c00;padding:1rem 1.5rem;border-radius:8px;font-size:.9rem;margin:2rem auto;max-width:1200px;display:flex;align-items:center;gap:.75rem}
    .setup-banner a{color:var(--accent);font-weight:600}

    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .about-grid,.contact-grid,.skills-header{grid-template-columns:1fr}
      .about-img-wrap{display:none}
    }
    @media(max-width:600px){
      .nav-links{display:none}
      .nav-menu{display:flex}
      .projects-grid{grid-template-columns:1fr}
      .hero-btns{flex-direction:column}
    }

    /* ── FADE IN ANIMATION ── */
    .fade-in{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
    .fade-in.visible{opacity:1;transform:none}

    /* ── MOBILE NAV ── */
    .mobile-nav{position:fixed;top:64px;left:0;right:0;background:var(--cream);border-bottom:1px solid var(--border);padding:1rem 5vw;z-index:99;transform:translateY(-110%);transition:transform .3s;display:flex;flex-direction:column;gap:.75rem}
    .mobile-nav.open{transform:none}
    .mobile-nav a{color:var(--ink2);text-decoration:none;font-size:1rem;font-weight:500;padding:.5rem 0;border-bottom:1px solid var(--border)}
  </style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loadingScreen">
  <div class="loader"></div>
  <div class="load-text">Loading Portfolio…</div>
</div>

<!-- Nav -->
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="#" id="navLogo">Port<span>.</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#projects">Projects</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
    <button class="nav-menu" id="menuBtn" onclick="toggleMobileNav()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="mobile-nav" id="mobileNav">
  <a href="#about"      onclick="closeMobileNav()">About</a>
  <a href="#skills"     onclick="closeMobileNav()">Skills</a>
  <a href="#projects"   onclick="closeMobileNav()">Projects</a>
  <a href="#experience" onclick="closeMobileNav()">Experience</a>
  <a href="#contact"    onclick="closeMobileNav()">Contact</a>
</div>

<!-- Portfolio sections will be injected here -->
<div id="portfolioRoot"></div>

<footer id="footerEl">
  <div>Made with ❤️ — Powered by <a href="admin.html">Portfolio CMS</a></div>
</footer>

<script>
// ── CONFIG ──────────────────────────────────────────────
const API_URL = localStorage.getItem('portfolio_api_url') || '';
// ────────────────────────────────────────────────────────

async function fetchPortfolioData() {
  if (!API_URL) return null;
  try {
    const res = await fetch(API_URL + '?cb=' + Date.now());
    const json = await res.json();
    return json.success ? json.data : null;
  } catch(e) {
    console.error('Fetch error:', e);
    return null;
  }
}

function metaToObj(metaArr) {
  const o = {};
  (metaArr || []).forEach(r => { o[r.key] = r.value; });
  return o;
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPortfolio(data) {
  const meta     = metaToObj(data.meta);
  const sections = (data.sections || []).filter(s => s.visible === 'true').sort((a,b)=>+a.order - +b.order);
  const accent   = meta.accentColor || '#c0392b';

  // Set CSS variable for accent color
  document.documentElement.style.setProperty('--accent', accent);

  // Update page title / nav logo
  document.title = (meta.name || 'Portfolio') + ' — Portfolio';
  document.getElementById('navLogo').innerHTML = (meta.name || 'Portfolio').split(' ')[0] + '<span>.</span>';

  let html = '';
  sections.forEach(sec => {
    switch(sec.type) {
      case 'hero':       html += renderHero(meta, data.social); break;
      case 'about':      html += renderAbout(meta); break;
      case 'skills':     html += renderSkills(data.skills); break;
      case 'projects':   html += renderProjects(data.projects); break;
      case 'experience': html += renderExperience(data.experience); break;
      case 'education':  html += renderEducation(data.education); break;
      case 'contact':    html += renderContact(meta, data.social); break;
    }
  });

  document.getElementById('portfolioRoot').innerHTML = html;

  // Animate skill bars
  setTimeout(() => {
    document.querySelectorAll('.skill-fill').forEach(el => {
      el.style.transform = `scaleX(${el.dataset.pct/100})`;
    });
  }, 400);

  // Intersection observer for fade-in
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.15 });
  document.querySelectorAll('.fade-in').forEach(el => io.observe(el));

  // Skill category filter
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.cat;
      document.querySelectorAll('.skill-card').forEach(card => {
        card.style.display = (cat === 'All' || card.dataset.cat === cat) ? '' : 'none';
      });
    });
  });
}

// ── SECTION RENDERERS ───────────────────────────────────
function renderHero(meta, social) {
  const socLinks = (social || []).map(s => `
    <a href="${escHtml(s.url)}" class="social-link" target="_blank" rel="noopener" title="${escHtml(s.platform)}">
      ${socialIcon(s.icon)}
    </a>`).join('');

  return `
  <section id="hero">
    <div class="hero-bg" style="background-image:url('${escHtml(meta.heroImage || '')}')"></div>
    <div class="hero-overlay"></div>
    <div class="hero-inner fade-in">
      <div class="hero-eyebrow">👋 Welcome to my portfolio</div>
      <h1 class="hero-name">${escHtml(meta.name || 'Your Name')}<br><em>${escHtml(meta.tagline || 'Developer & Designer')}</em></h1>
      <p class="hero-tagline">${escHtml(meta.bio ? meta.bio.substring(0,120)+'…' : '')}</p>
      <div class="hero-btns">
        <a href="#projects" class="btn btn-primary">View My Work →</a>
        ${meta.resumeUrl && meta.resumeUrl !== '#' ? `<a href="${escHtml(meta.resumeUrl)}" class="btn btn-outline" target="_blank">Download CV</a>` : `<a href="#contact" class="btn btn-outline">Get In Touch</a>`}
      </div>
      ${socLinks ? `<div class="social-links" style="margin-top:2.5rem">${socLinks}</div>` : ''}
    </div>
    <div class="hero-scroll"><div class="scroll-line"></div><span>Scroll</span></div>
  </section>`;
}

function renderAbout(meta) {
  return `
  <section id="about">
    <div class="section-inner">
      <div class="about-grid">
        <div class="about-img-wrap fade-in">
          <img class="about-img" src="${escHtml(meta.aboutImage || '')}" alt="${escHtml(meta.name || '')}" loading="lazy" onerror="this.style.display='none'"/>
          <div class="about-img-frame"></div>
        </div>
        <div class="fade-in">
          <div class="section-label">About Me</div>
          <h2 class="section-title">The Person Behind the Code</h2>
          <p class="about-text">${escHtml(meta.bio || '')}</p>
          ${meta.location ? `<p style="color:var(--ink3);font-size:.9rem">📍 ${escHtml(meta.location)}</p>` : ''}
          <div class="about-stats">
            <div class="stat"><div class="stat-num">5+</div><div class="stat-label">Years Exp.</div></div>
            <div class="stat"><div class="stat-num">30+</div><div class="stat-label">Projects</div></div>
            <div class="stat"><div class="stat-num">20+</div><div class="stat-label">Clients</div></div>
          </div>
        </div>
      </div>
    </div>
  </section>`;
}

function renderSkills(skills) {
  const sorted = (skills || []).sort((a,b) => +a.order - +b.order);
  const cats = ['All', ...new Set(sorted.map(s => s.category).filter(Boolean))];
  const catBtns = cats.map(c => `<button class="cat-btn${c==='All'?' active':''}" data-cat="${escHtml(c)}">${escHtml(c)}</button>`).join('');
  const cards = sorted.map(s => `
    <div class="skill-card fade-in" data-cat="${escHtml(s.category)}">
      <div class="skill-top">
        <span class="skill-name">${escHtml(s.name)}</span>
        <span class="skill-pct">${escHtml(s.level)}%</span>
      </div>
      <div class="skill-bar"><div class="skill-fill" data-pct="${escHtml(s.level)}"></div></div>
      <div class="skill-cat-tag">${escHtml(s.category)}</div>
    </div>`).join('');

  return `
  <section id="skills">
    <div class="section-inner">
      <div class="skills-header">
        <div class="fade-in">
          <div class="section-label">Skills</div>
          <h2 class="section-title">My Expertise</h2>
        </div>
        <div class="fade-in"><p class="section-sub">Technologies and tools I use to bring ideas to life.</p></div>
      </div>
      <div class="skills-cats fade-in">${catBtns}</div>
      <div class="skills-grid">${cards}</div>
    </div>
  </section>`;
}

function renderProjects(projects) {
  const sorted = (projects || []).sort((a,b) => +a.order - +b.order);
  const cards = sorted.map(p => {
    const tags = (p.tags || '').split(',').filter(Boolean).map(t => `<span class="tag">${escHtml(t.trim())}</span>`).join('');
    return `
    <div class="project-card fade-in">
      ${p.image ? `<img class="project-img" src="${escHtml(p.image)}" alt="${escHtml(p.title)}" loading="lazy" onerror="this.style.display='none'"/>` : ''}
      <div class="project-body">
        <h3 class="project-title">${escHtml(p.title)}</h3>
        <p class="project-desc">${escHtml(p.description)}</p>
        <div class="project-tags">${tags}</div>
        ${p.url ? `<a class="project-link" href="${escHtml(p.url)}" target="_blank" rel="noopener">View Project →</a>` : ''}
      </div>
    </div>`;
  }).join('');

  return `
  <section id="projects">
    <div class="section-inner">
      <div class="fade-in">
        <div class="section-label">Projects</div>
        <h2 class="section-title">Things I've Built</h2>
        <p class="section-sub">A selection of my recent work and side projects.</p>
      </div>
      <div class="projects-grid">${cards}</div>
    </div>
  </section>`;
}

function renderExperience(exp) {
  const sorted = (exp || []).sort((a,b) => +a.order - +b.order);
  const items = sorted.map(e => `
    <div class="tl-item fade-in">
      <div class="tl-dot"><svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.1-.9-2-2-2h-4c-1.1 0-2 .9-2 2v2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-8 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm2-9h-4V4h4v2z"/></svg></div>
      <div class="tl-card">
        <div class="tl-meta">
          <span class="tl-role">${escHtml(e.role)}</span>
          <span class="tl-period">${escHtml(e.period)}</span>
        </div>
        <div class="tl-company">${escHtml(e.company)}</div>
        <p class="tl-desc">${escHtml(e.description)}</p>
      </div>
    </div>`).join('');

  return `
  <section id="experience">
    <div class="section-inner">
      <div class="fade-in">
        <div class="section-label">Experience</div>
        <h2 class="section-title">Work History</h2>
      </div>
      <div class="timeline">${items}</div>
    </div>
  </section>`;
}

function renderEducation(edu) {
  const sorted = (edu || []).sort((a,b) => +a.order - +b.order);
  const items = sorted.map(e => `
    <div class="tl-item fade-in">
      <div class="tl-dot"><svg viewBox="0 0 24 24"><path d="M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82zM12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg></div>
      <div class="tl-card">
        <div class="tl-meta">
          <span class="tl-role">${escHtml(e.degree)}</span>
          <span class="tl-period">${escHtml(e.year)}</span>
        </div>
        <div class="tl-company">${escHtml(e.institution)}</div>
        <p class="tl-desc">${escHtml(e.description)}</p>
      </div>
    </div>`).join('');

  return `
  <section id="education">
    <div class="section-inner">
      <div class="fade-in">
        <div class="section-label">Education</div>
        <h2 class="section-title">Academic Background</h2>
      </div>
      <div class="timeline">${items}</div>
    </div>
  </section>`;
}

function renderContact(meta, social) {
  const socLinks = (social || []).map(s => `
    <a href="${escHtml(s.url)}" class="social-link" target="_blank" rel="noopener" title="${escHtml(s.platform)}">
      ${socialIcon(s.icon)}
    </a>`).join('');

  return `
  <section id="contact">
    <div class="section-inner">
      <div class="contact-grid">
        <div class="fade-in">
          <div class="section-label">Contact</div>
          <h2 class="section-title">Let's Work Together</h2>
          <p class="section-sub">Have a project in mind or just want to say hello? I'd love to hear from you.</p>
          <div class="contact-items">
            ${meta.email ? `<div class="contact-item"><div class="contact-icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg></div><a class="contact-val" href="mailto:${escHtml(meta.email)}">${escHtml(meta.email)}</a></div>` : ''}
            ${meta.phone ? `<div class="contact-item"><div class="contact-icon"><svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></div><a class="contact-val" href="tel:${escHtml(meta.phone)}">${escHtml(meta.phone)}</a></div>` : ''}
            ${meta.location ? `<div class="contact-item"><div class="contact-icon"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div><span class="contact-val">${escHtml(meta.location)}</span></div>` : ''}
          </div>
          ${socLinks ? `<div class="social-links">${socLinks}</div>` : ''}
        </div>
        <div class="contact-form-side fade-in">
          <h3>Send a Message</h3>
          <div class="form-group"><label>Your Name</label><input type="text" placeholder="John Doe"/></div>
          <div class="form-group"><label>Email Address</label><input type="email" placeholder="john@example.com"/></div>
          <div class="form-group"><label>Message</label><textarea placeholder="Tell me about your project…"></textarea></div>
          <p class="form-note">* Connect with a form service like Formspree for real email sending.</p>
          <button class="btn btn-primary" style="width:100%;margin-top:.5rem;justify-content:center" onclick="alert('Connect a form service in admin settings!')">Send Message →</button>
        </div>
      </div>
    </div>
  </section>`;
}

// ── MOBILE NAV ──
function toggleMobileNav() {
  document.getElementById('mobileNav').classList.toggle('open');
}
function closeMobileNav() {
  document.getElementById('mobileNav').classList.remove('open');
}

// ── MAIN ────────────────────────────────────────────────
(async function init() {
  if (!API_URL) {
    // Show setup message
    document.getElementById('loadingScreen').classList.add('hidden');
    document.getElementById('portfolioRoot').innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center">
        <div>
          <div style="font-size:3rem;margin-bottom:1rem">🚀</div>
          <h1 style="font-family:'Playfair Display',serif;font-size:2rem;margin-bottom:1rem">Setup Required</h1>
          <p style="color:var(--ink3);margin-bottom:2rem;max-width:400px">Please go to the <strong>Admin Panel</strong> first and configure your Google Apps Script URL to load your portfolio data.</p>
          <a href="admin.html" class="btn btn-primary">Open Admin Panel →</a>
        </div>
      </div>`;
    return;
  }

  const data = await fetchPortfolioData();
  document.getElementById('loadingScreen').classList.add('hidden');

  if (!data) {
    document.getElementById('portfolioRoot').innerHTML = `
      <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center">
        <div>
          <div style="font-size:2rem;margin-bottom:1rem">⚠️</div>
          <h2>Could not load portfolio data</h2>
          <p style="color:var(--ink3);margin-top:.5rem">Check your API URL in the <a href="admin.html">admin panel</a>.</p>
        </div>
      </div>`;
    return;
  }

  renderPortfolio(data);
})();
</script>
