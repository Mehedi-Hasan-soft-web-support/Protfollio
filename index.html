<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title id="pageTitle">Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#09090b; --bg2:#111113; --bg3:#18181b;
  --surface:#1c1c1f; --surface2:#27272a;
  --border:#2e2e32; --border2:#3f3f46;
  --text:#fafafa; --text2:#a1a1aa; --text3:#71717a;
  --accent:#6366f1; --accent2:#818cf8; --accentRgb:99,102,241;
  --green:#22d3ee; --red:#f87171;
  --r:14px;
}
.theme-light{
  --bg:#f8fafc; --bg2:#f1f5f9; --bg3:#e2e8f0;
  --surface:#ffffff; --surface2:#f8fafc;
  --border:#e2e8f0; --border2:#cbd5e1;
  --text:#0f172a; --text2:#475569; --text3:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--border2) var(--bg)}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;transition:background .3s,color .3s}
::selection{background:rgba(var(--accentRgb),.3);color:var(--text)}

/* ── NAV ── */
#nav{position:fixed;top:0;left:0;right:0;z-index:90;transition:all .3s}
#nav.scrolled{background:rgba(9,9,11,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.theme-light #nav.scrolled{background:rgba(248,250,252,.9)}
.nav-wrap{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:68px}
.nav-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.nav-brand .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;display:inline-block}
.nav-links{display:flex;gap:8px;list-style:none}
.nav-links a{color:var(--text2);text-decoration:none;font-size:.85rem;font-weight:500;padding:6px 14px;border-radius:8px;transition:all .2s}
.nav-links a:hover{color:var(--text);background:var(--surface2)}
.nav-actions{display:flex;gap:8px;align-items:center}
.nav-cta{background:var(--accent);color:#fff;padding:8px 20px;border-radius:10px;text-decoration:none;font-size:.85rem;font-weight:600;transition:all .2s}
.nav-cta:hover{opacity:.9;transform:translateY(-1px)}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
.hamburger span{width:20px;height:2px;background:var(--text);border-radius:2px;transition:.3s}

/* ── HERO ── */
#hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding:80px 24px 60px}
.hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(var(--accentRgb),.04) 1px,transparent 1px),linear-gradient(90deg,rgba(var(--accentRgb),.04) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%)}
.hero-glow{position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(var(--accentRgb),.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.hero-inner{max-width:1200px;margin:0 auto;width:100%;position:relative;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 16px 6px 10px;font-size:.8rem;color:var(--text2);margin-bottom:24px}
.hero-badge .pulse{width:8px;height:8px;background:var(--green);border-radius:50%;position:relative}
.hero-badge .pulse::after{content:'';position:absolute;inset:-2px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;opacity:.5}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.8);opacity:0}}
.hero-name{font-family:'Syne',sans-serif;font-size:clamp(2.6rem,5vw,4.2rem);font-weight:800;line-height:1.05;letter-spacing:-.03em;margin-bottom:8px}
.hero-name .grad{background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-title{font-size:clamp(1rem,2vw,1.3rem);color:var(--text2);font-weight:400;margin-bottom:20px}
.hero-bio{color:var(--text3);line-height:1.8;font-size:.95rem;margin-bottom:32px;max-width:460px}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:12px;font-size:.9rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-accent{background:var(--accent);color:#fff;box-shadow:0 0 30px rgba(var(--accentRgb),.3)}
.btn-accent:hover{transform:translateY(-2px);box-shadow:0 0 40px rgba(var(--accentRgb),.5)}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border2)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);background:rgba(var(--accentRgb),.06)}
.hero-stats{display:flex;gap:28px;margin-top:36px;padding-top:28px;border-top:1px solid var(--border)}
.stat-item .n{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--text)}
.stat-item .n span{color:var(--accent)}
.stat-item .l{color:var(--text3);font-size:.8rem;font-weight:500;margin-top:2px}
.hero-visual{position:relative;display:flex;align-items:center;justify-content:center}
.hero-img-wrap{width:320px;height:400px;position:relative}
.hero-img-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(var(--accentRgb),.15),rgba(34,211,238,.1));border-radius:30px 30px 50% 50%;border:1px solid var(--border)}
.hero-img{width:100%;height:100%;object-fit:cover;border-radius:30px 30px 50% 50%;position:relative;z-index:1;display:block}
.hero-img-glow{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:80%;height:40px;background:radial-gradient(ellipse,rgba(var(--accentRgb),.4),transparent);filter:blur(15px)}
.floating-card{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 16px;box-shadow:0 8px 32px rgba(0,0,0,.3);backdrop-filter:blur(10px);display:flex;align-items:center;gap:10px;font-size:.8rem;font-weight:600}
.floating-card.c1{top:20px;right:-20px;animation:float 3s ease-in-out infinite}
.floating-card.c2{bottom:40px;left:-30px;animation:float 3s ease-in-out infinite 1.5s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── SECTION COMMON ── */
.section{padding:100px 24px}
.section-wrap{max-width:1200px;margin:0 auto}
.section-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(var(--accentRgb),.1);color:var(--accent);border:1px solid rgba(var(--accentRgb),.2);border-radius:100px;padding:5px 14px;font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px}
.section-title{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;margin-bottom:12px}
.section-sub{color:var(--text2);font-size:1rem;line-height:1.7;max-width:500px}
.section-head{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:end;margin-bottom:56px}
@media(max-width:700px){.section-head{grid-template-columns:1fr}}

/* ── ABOUT ── */
#about{background:var(--bg2);border-top:1px solid var(--border)}
.about-grid{display:grid;grid-template-columns:1fr 1.6fr;gap:60px;align-items:center}
.about-photo-wrap{position:relative}
.about-photo{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:24px;display:block;filter:grayscale(.1)}
.about-photo-border{position:absolute;inset:-10px;border-radius:28px;border:1px solid var(--border);background:linear-gradient(135deg,rgba(var(--accentRgb),.08),transparent);z-index:-1}
.about-tag{display:inline-block;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:.78rem;font-weight:600;padding:4px 12px;border-radius:6px;margin-bottom:24px}
.about-bio{color:var(--text2);line-height:1.85;font-size:.97rem;margin-bottom:28px}
.about-info{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-row{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--surface);border-radius:10px;border:1px solid var(--border)}
.info-row .icon{color:var(--accent);font-size:1.1rem;flex-shrink:0;margin-top:2px}
.info-row .v{font-size:.875rem;font-weight:500;color:var(--text)}
.info-row .k{font-size:.75rem;color:var(--text3);margin-top:1px}

/* ── SKILLS ── */
.skills-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.filt{padding:6px 16px;border-radius:100px;font-size:.82rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;transition:all .2s}
.filt.on,.filt:hover{border-color:var(--accent);background:rgba(var(--accentRgb),.1);color:var(--accent)}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.skill-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;transition:all .25s}
.skill-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.2)}
.sk-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sk-name{font-weight:600;font-size:.9rem}
.sk-pct{font-size:.8rem;font-weight:700;color:var(--accent)}
.sk-bar{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden}
.sk-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:4px;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.sk-cat{font-size:.72rem;color:var(--text3);font-weight:500;margin-top:8px}

/* ── PROJECTS ── */
#projects{background:var(--bg2);border-top:1px solid var(--border)}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .25s;display:flex;flex-direction:column}
.proj-card:hover{transform:translateY(-6px);border-color:var(--border2);box-shadow:0 24px 48px rgba(0,0,0,.3)}
.proj-img-wrap{position:relative;overflow:hidden}
.proj-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:transform .4s}
.proj-card:hover .proj-img{transform:scale(1.04)}
.proj-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.8));opacity:0;transition:.3s;display:flex;align-items:flex-end;padding:20px}
.proj-card:hover .proj-overlay{opacity:1}
.proj-view{color:#fff;font-size:.85rem;font-weight:600;display:flex;align-items:center;gap:6px}
.proj-body{padding:20px;flex:1;display:flex;flex-direction:column}
.proj-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:8px;color:var(--text)}
.proj-desc{color:var(--text2);font-size:.875rem;line-height:1.7;flex:1;margin-bottom:14px}
.proj-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tag{font-size:.72rem;background:rgba(var(--accentRgb),.1);color:var(--accent);padding:3px 10px;border-radius:6px;font-weight:600;border:1px solid rgba(var(--accentRgb),.15)}
.proj-link{color:var(--accent);font-size:.85rem;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:5px;transition:gap .2s}
.proj-link:hover{gap:9px}

/* ── TIMELINE ── */
.timeline-list{display:flex;flex-direction:column;gap:0;position:relative;padding-left:30px}
.timeline-list::before{content:'';position:absolute;left:7px;top:12px;bottom:12px;width:2px;background:linear-gradient(to bottom,var(--accent),var(--green),transparent)}
.tl-item{position:relative;padding:0 0 40px 32px}
.tl-dot{position:absolute;left:-30px;top:4px;width:16px;height:16px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);box-shadow:0 0 0 3px var(--accent),0 0 12px rgba(var(--accentRgb),.4)}
#education .tl-dot{background:var(--green);box-shadow:0 0 0 3px var(--green),0 0 12px rgba(34,211,238,.4)}
.tl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;transition:border-color .2s}
.tl-card:hover{border-color:var(--border2)}
.tl-top{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.tl-role{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text)}
.tl-period{font-size:.75rem;font-weight:700;background:rgba(var(--accentRgb),.15);color:var(--accent);padding:3px 10px;border-radius:6px;border:1px solid rgba(var(--accentRgb),.2)}
#education .tl-period{background:rgba(34,211,238,.1);color:var(--green);border-color:rgba(34,211,238,.2)}
.tl-company{font-size:.875rem;color:var(--accent);font-weight:600;margin-bottom:8px}
#education .tl-company{color:var(--green)}
.tl-desc{font-size:.875rem;color:var(--text2);line-height:1.7}

/* ── CONTACT ── */
#contact{background:var(--bg3);border-top:1px solid var(--border)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start}
.contact-info-list{display:flex;flex-direction:column;gap:14px;margin-top:24px}
.c-info{display:flex;align-items:center;gap:14px}
.c-icon{width:42px;height:42px;border-radius:12px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem}
.c-val{font-size:.9rem;font-weight:500;color:var(--text);text-decoration:none}
.c-val:hover{color:var(--accent)}
.c-label{font-size:.75rem;color:var(--text3)}
.social-row{display:flex;gap:10px;margin-top:28px}
.soc-btn{width:42px;height:42px;border-radius:12px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text2);text-decoration:none;font-size:.95rem;transition:all .2s}
.soc-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;transform:translateY(-3px)}
.soc-btn svg{width:18px;height:18px;fill:currentColor}
.contact-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px}
.contact-form h3{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:20px;color:var(--text)}
.f-group{margin-bottom:16px}
.f-label{display:block;font-size:.78rem;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.04em}
.f-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;transition:border .2s}
.f-input:focus{border-color:var(--accent);background:var(--bg2)}
.f-input::placeholder{color:var(--text3)}
textarea.f-input{resize:vertical;min-height:100px}
.f-note{font-size:.75rem;color:var(--text3);margin-top:8px}
.f-submit{width:100%;margin-top:4px;justify-content:center}

/* ── FOOTER ── */
footer{background:var(--bg);border-top:1px solid var(--border);padding:24px;text-align:center;color:var(--text3);font-size:.82rem}
footer a{color:var(--text2);text-decoration:none}
footer a:hover{color:var(--accent)}

/* ── LOADER ── */
#loader{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .5s}
#loader.gone{opacity:0;pointer-events:none}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-name{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text2);letter-spacing:.04em}

/* ── FADE IN ── */
.fi{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.fi.in{opacity:1;transform:none}
.fi.d1{transition-delay:.1s}.fi.d2{transition-delay:.2s}.fi.d3{transition-delay:.3s}

/* ── MOBILE NAV ── */
.mob-nav{position:fixed;top:68px;left:0;right:0;background:var(--bg);border-bottom:1px solid var(--border);padding:16px 24px;z-index:89;display:flex;flex-direction:column;gap:4px;transform:translateY(-110%);transition:.3s}
.mob-nav.open{transform:none}
.mob-nav a{color:var(--text2);text-decoration:none;font-size:.95rem;font-weight:500;padding:10px 12px;border-radius:8px;transition:.2s}
.mob-nav a:hover{background:var(--surface);color:var(--text)}

/* ── NO API SETUP SCREEN ── */
.setup-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.setup-box{max-width:440px}
.setup-box .emoji{font-size:3rem;margin-bottom:16px}
.setup-box h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;margin-bottom:12px}
.setup-box p{color:var(--text2);margin-bottom:24px;line-height:1.7}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .hero-inner,.about-grid,.contact-grid{grid-template-columns:1fr}
  .hero-visual{display:none}
  .section-head{grid-template-columns:1fr}
}
@media(max-width:600px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .hero-stats{gap:20px}
  .projects-grid{grid-template-columns:1fr}
  .about-info{grid-template-columns:1fr}
  .section{padding:72px 20px}
}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><div class="loader-name">Loading…</div></div>

<nav id="nav">
  <div class="nav-wrap">
    <div class="nav-brand" id="navBrand"><span class="dot"></span><span id="navName">Portfolio</span></div>
    <ul class="nav-links" id="navLinks"></ul>
    <div class="nav-actions">
      <a href="#contact" class="nav-cta">Hire Me</a>
      <button class="hamburger" onclick="toggleMob()"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div class="mob-nav" id="mobNav"></div>

<div id="root"></div>

<footer id="foot">
  <div>Designed & built by <strong id="footName">Me</strong> — Powered by <a href="admin.html">Portfolio CMS</a> + Google Sheets</div>
</footer>

<script>
const API_URL = localStorage.getItem('pf_api') || '';

// ── Helpers ─────────────────────────────────────────────
function h(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function meta(arr,k){ const r=(arr||[]).find(x=>x.key===k); return r?r.value:''; }

// ── Fetch data ───────────────────────────────────────────
async function load(){
  if(!API_URL) return null;
  try{
    const r = await fetch(API_URL+'?cb='+Date.now());
    const j = await r.json();
    return j.ok ? j.data : null;
  }catch(e){ return null; }
}

// ── Nav scroll ───────────────────────────────────────────
window.addEventListener('scroll',()=>{
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY>30);
});

// ── Mobile nav ───────────────────────────────────────────
let mobOpen=false;
function toggleMob(){ mobOpen=!mobOpen; document.getElementById('mobNav').classList.toggle('open',mobOpen); }

// ── RENDER ──────────────────────────────────────────────
function render(D){
  const P  = D.profile||[];
  const theme  = meta(P,'theme')||'dark';
  const color  = meta(P,'color')||'#6366f1';
  const name   = meta(P,'name')||'Your Name';
  const secList= (D.sections||[]).filter(s=>s.visible==='true').sort((a,b)=>+a.order-+b.order);

  // Apply theme & color
  if(theme==='light') document.body.classList.add('theme-light');
  const hex2rgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`${r},${g},${b}`};
  document.documentElement.style.setProperty('--accent',color);
  document.documentElement.style.setProperty('--accentRgb',hex2rgb(color));

  document.title = name + ' — Portfolio';
  document.getElementById('pageTitle').textContent = name+' — Portfolio';
  document.getElementById('navName').textContent   = name.split(' ')[0];
  document.getElementById('footName').textContent  = name;

  // Nav links
  const nlinks = secList.filter(s=>s.type!=='hero').map(s=>`<li><a href="#${s.type}">${h(s.title)}</a></li>`).join('');
  document.getElementById('navLinks').innerHTML = nlinks;
  document.getElementById('mobNav').innerHTML   = secList.filter(s=>s.type!=='hero').map(s=>`<a href="#${s.type}" onclick="toggleMob()">${h(s.title)}</a>`).join('');

  // Sections
  let html='';
  secList.forEach(s=>{
    switch(s.type){
      case 'hero':       html+=buildHero(P,D.social);break;
      case 'about':      html+=buildAbout(P);break;
      case 'skills':     html+=buildSkills(D.skills);break;
      case 'projects':   html+=buildProjects(D.projects);break;
      case 'timeline':   html+=buildTimeline(D.timeline,s);break;
      case 'education':  html+=buildEducation(D.education);break;
      case 'contact':    html+=buildContact(P,D.social);break;
      case 'custom':     html+=buildCustom(s,D.custom);break;
    }
  });
  document.getElementById('root').innerHTML = html;

  // Post render
  requestAnimationFrame(()=>{
    // Skill bars
    document.querySelectorAll('.sk-fill').forEach(el=>{
      el.style.width = (el.dataset.pct||0)+'%';
    });

    // Skill filter
    document.querySelectorAll('.filt').forEach(btn=>{
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.filt').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
        const cat=btn.dataset.cat;
        document.querySelectorAll('.skill-card').forEach(c=>{
          c.style.display=(cat==='All'||c.dataset.cat===cat)?'':'none';
        });
      });
    });

    // Intersection observer
    const io=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');});
    },{threshold:0.12});
    document.querySelectorAll('.fi').forEach(el=>io.observe(el));
  });
}

function buildSkills(skills){
  const sorted=(skills||[]).slice().sort((a,b)=>+a.order-+b.order);
  const cats=['All',...new Set(sorted.map(s=>s.cat).filter(Boolean))];
  const filts=cats.map(c=>`<button class="filt${c==='All'?' on':''}" data-cat="${h(c)}">${h(c)}</button>`).join('');
  const cards=sorted.map(s=>`
    <div class="skill-card fi" data-cat="${h(s.cat)}">
      <div class="sk-head"><span class="sk-name">${h(s.name)}</span><span class="sk-pct">${h(s.pct)}%</span></div>
      <div class="sk-bar"><div class="sk-fill" data-pct="${h(s.pct)}"></div></div>
      <div class="sk-cat">${h(s.cat)}</div>
    </div>`).join('');
  return`
  <section id="skills" class="section">
    <div class="section-wrap">
      <div class="section-head">
        <div class="fi"><div class="section-chip">Skills</div><h2 class="section-title">My Expertise</h2></div>
        <div class="fi d1"><p class="section-sub">Technologies and tools I use to bring ideas to life, day in day out.</p></div>
      </div>
      <div class="skills-filter fi">${filts}</div>
      <div class="skills-grid">${cards}</div>
    </div>
  </section>`;
}

function buildProjects(projects){
  const sorted=(projects||[]).slice().sort((a,b)=>+a.order-+b.order);
  const cards=sorted.map(p=>{
    const tags=(p.tags||'').split(',').filter(Boolean).map(t=>`<span class="tag">${h(t.trim())}</span>`).join('');
    return`
    <div class="proj-card fi">
      ${p.img?`<div class="proj-img-wrap">
        <img class="proj-img" src="${h(p.img)}" alt="${h(p.title)}" loading="lazy" onerror="this.parentElement.style.display='none'"/>

        <h3 class="proj-title">${h(p.title)}</h3>
        <p class="proj-desc">${h(p.desc)}</p>
        <div class="proj-tags">${tags}</div>
        ${p.url?`<a class="proj-link" href="${h(p.url)}" target="_blank">Live / GitHub →</a>`:''}

}
